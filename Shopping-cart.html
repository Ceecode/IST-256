<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basketball Club Store</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css.css" rel="stylesheet">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Future JavaScript -->
<script defer src="shoppingCart.js"></script>

</head>

<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="index.html">🏀 Basketball Club</a>

<div class="navbar-nav ms-auto">
<a class="nav-link" href="index.html">Home</a>
<a class="nav-link" href="signup.html">Team Registration</a>
<a class="nav-link active" href="product-management.html">Product Management</a>
<a class="nav-link active" href="billing.html">Billing</a>
<a class="nav-link" href="returns.html">Returns</a>
</div>

</div>
</nav>


<div class="container mt-5">

<h2 class="mb-4">Basketball Storefront</h2>

<!-- Product Form -->
<h4>Add / Update Product</h4>

<form id="productForm" class="mb-5">

<div class="mb-3">
<label class="form-label">Product ID</label>
<input type="text" class="form-control" id="productId" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<input type="text" class="form-control" id="description" required>
</div>

<div class="mb-3">
<label class="form-label">Category</label>
<input type="text" class="form-control" id="category" required>
</div>

<div class="mb-3">
<label class="form-label">Unit of Measure</label>
<input type="text" class="form-control" id="unit" required>
</div>

<div class="mb-3">
<label class="form-label">Price</label>
<input type="number" class="form-control" id="price" required>
</div>

<button type="submit" class="btn btn-primary">
Save Product
</button>

</form>


<!-- Search -->
<h4>Search Products</h4>

<input
type="text"
id="searchInput"
class="form-control mb-3"
placeholder="Search by Product ID or Name">


<!-- Product Table -->
<h4>Available Products</h4>

<table class="table table-bordered">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Description</th>
<th>Category</th>
<th>Unit</th>
<th>Price</th>
<th>Action</th>
</tr>
</thead>

<tbody id="productTable">

<!-- Products will be inserted with jQuery -->

</tbody>

</table>


<!-- Shopping Cart -->
<h4 class="mt-5">Shopping Cart</h4>

<table class="table table-striped">

<thead class="table-dark">
<tr>
<th>ID</th>
<th>Description</th>
<th>Price</th>
<th>Remove</th>
</tr>
</thead>

<tbody id="cartTable">

<!-- Cart items added with JavaScript -->

</tbody>

</table>


<button class="btn btn-success mt-3" id="checkoutBtn">
Send to Cart
</button>

</div>

</body>
</html>
