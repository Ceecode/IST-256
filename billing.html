<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Billing</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Your CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR (match your other pages) -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Basketball Shop</a>

    <div class="navbar-nav">
      <a class="nav-link active" href="billing.html">Billing</a>
      <a class="nav-link" href="returns.html">Returns</a>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-5">

  <h2 class="mb-4">Billing Details</h2>

  <form id="billingForm">

    <!-- Customer Info -->
    <div class="card p-4 mb-4">
      <h4>Customer Information</h4>
      <input type="text" id="fullName" class="form-control mb-3" placeholder="Full Name" required>
      <input type="text" id="address" class="form-control" placeholder="Address" required>
    </div>

    <!-- Payment Info -->
    <div class="card p-4 mb-4">
      <h4>Payment Details</h4>
      <input type="text" id="cardNumber" class="form-control mb-3" placeholder="Card Number" required>
      <input type="text" id="expDate" class="form-control mb-3" placeholder="MM/YY" required>
      <input type="text" id="cvv" class="form-control" placeholder="CVV" required>
    </div>

    <!-- Order Summary -->
    <div class="card p-4 mb-4">
      <h4>Order Summary</h4>
      <p>Basketball Shoes - $80</p>
      <p>Shipping: $5</p>
      <h5>Total: $85</h5>
    </div>

    <button type="submit" class="btn btn-primary w-100">Submit Payment</button>

  </form>

</div>

</body>
</html>
