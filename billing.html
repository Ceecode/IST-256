<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <title>Billing</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
   <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
   <link rel="stylesheet" href="styles.css">
</head>

<body ng-app="shopApp" ng-controller="MainController">

   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
         <a class="navbar-brand" href="#">Basketball Shop</a>
         <div class="navbar-nav ms auto">
            <a class="nav-link" href="Shopping-Cart.html">Shop</a>
            <a class="nav-link active" href="billing.html">Billing</a>
            <a class="nav-link" href="returns.html">Returns</a>
         </div>
      </div>
   </nav>

   <div class="container mt-5">
      <h2 class="mb-4">Billing Details</h2>

      <form id="billingForm" ng-submit="submitBilling()">

         <div class="card p-4 mb-4">
            <h4>Customer Information</h4>
            <input type="text" ng-model="billingData.fullName" class="form-control mb-3" placeholder="Full Name" required>
            <input type="text" ng-model="billingData.address" class="form-control" placeholder="Address" required>
         </div>

         <div class="card p-4 mb-4">
            <h4>Payment Details</h4>
            <input type="text" ng-model="billingData.cardNumber" class="form-control mb-3" placeholder="Card Number" required>
            <div class="row">
               <div class="col">
                  <input type="text" ng-model="billingData.expDate" class="form-control mb-3" placeholder="MM/YY" required>
               </div>
               <div class="col">
                  <input type="text" ng-model="billingData.cvv" class="form-control mb-3" placeholder="CVV" required>
               </div>
            </div>
         </div>

   <div class="card p-4 mb-4">
      <h4>Order Summary</h4>

      <div ng-repeat="item in orderItems" class="d-flex justify-content-between">
         <span>{{item.description}}</span>
         <span>${{item.price | number:2}}</span>
      </div>

      <hr>
      <div class="d-flex justify-content-between">
         <span>Subtotal:</span>
         <span>${{orderSummary.subtotal}}</span>
      </div>
      <div class="d-flex justify-content-between">
         <span>Tax:</span>
         <span>${{orderSummary.tax}}</span>
      </div>
      <div class="d-flex justify-content-between">
         <span>Shipping:</span>
         <span>${{orderSummary.delivery}}</span>
      </div>
      <div class="d-flex justify-content-between mt-2">
         <strong>Total:</strong>
         <strong>${{orderSummary.total}}</strong>
      </div>
   </div>

         <button type="submit" class="btn btn-primary w-100">Submit Payment</button>
      </form>
   </div>

   <script src="billing.js"></script>
</body>

</html>
