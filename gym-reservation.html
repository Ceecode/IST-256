<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gym Timeslot Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script defer src="gymRental.js"></script>
</head>
<body class="" style="background-image: url('bballnet.jpg'); background-size: cover; background-position: center;
background-repeat: no-repeat;">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">🏀 Basketball Club - Home</a>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="text-center">Timeslot Reservation</h2>
    <p class="text-center">Register</p>
    
    <form id="reservationForm" class="mb-4">
        <div class="mb-3">
            <label class="form-label">Team Captain's Name</label>
            <input type="text" class="form-control" id="captainName" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" id="date" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Time Slot</label>
            <select class="form-select" id="timeSlot" required>
                <option value="">Select a time...</option>
                <option value="1:30 - 3:00 PM">1:30 - 3:00 PM</option>
                <option value="3:00 - 5:30 PM">3:00 - 5:30 PM</option>
                <option value="5:30 - 7:00 PM">5:30 - 7:00 PM</option>
                <option value="7:00 - 9:30 PM">7:00 - 9:30 PM</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Team Name</label>
            <input type="text" class="form-control" id="teamName" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Number of Players</label>
            <input type="number" class="form-control" id="players" min="5" max="15" required>
        </div>

        <div class="mb-3">
            <label class="form-label d-block">Cost</label>
            <div class="h4 text-primary">
                $ <span id="costDisplay">45.00</span>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">Submit Reservation</button>
    </form>

    <hr>

    <h3>Current Reservations</h3>
    <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search by Captain or Team Name">

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Captain Name</th>
                <th>Date</th>
                <th>Time Slot</th>
                <th>Team Name</th>
                <th>Players</th>
                <th>Cost</th>
            </tr>
        </thead>
        <tbody id="reservationTable"></tbody>
    </table>
</div>

</body>
</html>
