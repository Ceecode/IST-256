<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gym Timeslot Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script defer src="gym-reservation.js"></script>

</head>
<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">IM Basketball Portal</a>
  </div>
</nav>

<div class="container mt-5">

  <h2 class="text-center">Timeslot Reservation</h2>
  <p class="text-center">Register</p>

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card p-4">

        <form id="reservationForm">

          <div class="mb-3">
            <label>Reservation ID</label>
            <input type="text" class="form-control" id="reservationId" required>
          </div>

          <div class="mb-3">
            <label>Date</label>
            <input type="date" class="form-control" id="date" required>
          </div>

          <div class="mb-3">
            <label>Time Slot</label>
            <select class="form-select" id="timeSlot" required>
              <option value="">Select a time</option>
              <option>1:30 - 3:00 PM</option>
              <option>3:00 - 5:30 PM</option>
              <option>5:30 - 7:00 PM</option>
              <option>7:00 - 9:30 PM</option>
            </select>
          </div>

          <div class="mb-3">
            <label>Team Name</label>
            <input type="text" class="form-control" id="teamName" required>
          </div>

          <div class="mb-3">
            <label>Number of Players</label>
            <input type="number" class="form-control" id="players" min="5" max="15" required>
          </div>

          <div class="mb-3">
            <label>Hours</label>
            <select class="form-select" id="hours" required>
              <option value="">Select hours</option>
              <option value="1">1 Hour</option>
              <option value="2">2 Hours</option>
              <option value="3">3 Hours</option>
            </select>
          </div>

          <div class="mb-3">
            <label>Cost</label>
            <input type="number" class="form-control" id="cost" readonly>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Submit Reservation
          </button>

        </form>

      </div>

    </div>
  </div>

  <div class="mt-5">
    <h4>Current Reservations</h4>

    <table class="table table-bordered">
      <thead>
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Time</th>
          <th>Team</th>
          <th>Players</th>
          <th>Hours</th>
          <th>Cost</th>
        </tr>
      </thead>
      <tbody id="reservationTable">
      </tbody>
    </table>

  </div>

</div>

</body>
</html>
