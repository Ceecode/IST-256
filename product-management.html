<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basketball Club - Order Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script defer src="productManagementScript.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">🏀 Basketball Club - Home</a>
        <div class="navbar-nav">
            <a class="nav-link" href="gymRental.html">Rent the Gym for Practice here!</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2>Place Your Order</h2>
    <form id="productForm" class="mb-4">
        <div class="mb-3">
            <label class="form-label">Customer Name</label>
            <input type="text" class="form-control" id="customerName" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Product Name</label>
            <select class="form-select" id="productName" required>
                <option value="">Select a product...</option>
                <option value="Hat">Hats</option>
                <option value="Jersey">Jerseys</option>
                <option value="Water Bottle">Water Bottles</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Size</label>
            <select class="form-select" id="size" required>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" class="form-control" id="unit" min="1" value="1" required>
        </div>

         <div class="mb-3">
            <label class="form-label d-block">Total Price</label>
            <div class="h4 text-success">
               $ <span id="totalDisplay">0.00</span>
            </div>
         </div>

        <button type="submit" class="btn btn-primary">Save Product</button>
    </form>

    <hr>

    <h3>Search Orders</h3>
    <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search by Customer Name">

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Customer</th>
                <th>Product</th>
                <th>Size</th>
                <th>Qty</th>
                <th>Total Price</th>
            </tr>
        </thead>
        <tbody id="productTable"></tbody>
    </table>
</div>

</body>
</html>
