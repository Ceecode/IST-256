<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Returns</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
 
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- SAME NAVBAR. -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Basketball Shop</a>

    <div class="navbar-nav">
      <a class="nav-link" href="billing.html">Billing</a>
      <a class="nav-link active" href="returns.html">Returns</a>
    </div>
  </div>
</nav>

<div class="container mt-5">

  <h2 class="mb-4">Return a Product</h2>

  <!-- SEARCH -->
  <input type="text" id="searchBox" class="form-control mb-4" placeholder="Search product...">

  <!-- PRODUCT LIST -->
  <div class="card p-4 mb-4">
    <h4>Products</h4>

    <div class="d-flex align-items-center mb-3">
      <img src="shoe.jpg" width="80" class="me-3">
      <div>
        <h5>Basketball Shoes</h5>
        <p>$80</p>
      </div>
    </div>

  </div>

  <!-- RETURN FORM -->
  <form id="returnForm" class="card p-4">

    <h4>Return Details</h4>

    <label class="mt-2">Reason</label>
    <select class="form-control mb-3" required>
      <option>Damaged</option>
      <option>Wrong Item</option>
      <option>Not Satisfied</option>
    </select>

    <label>Condition</label>
    <select class="form-control mb-4" required>
      <option>New</option>
      <option>Used</option>
      <option>Damaged</option>
    </select>

    <button type="submit" class="btn btn-danger w-100">Submit Return</button>

  </form>

</div>

</body>
</html>
