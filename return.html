<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <title>Returns</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
   <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
   <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
   <style>
      #resultsList {
         z-index: 1000;
         display: none;
         max-height: 200px;
         overflow-y: auto;
      }

      .list-group-item {
         cursor: pointer;
      }
   </style>
</head>

<body ng-app="shopApp" ng-controller="MainController" class="bg-light">

   <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
         <a class="navbar-brand" href="#">Basketball Shop</a>
         <div class="navbar-nav">
            <a class="nav-link" href="billing.html">Billing</a>
            <a class="nav-link active" href="returns.html">Returns</a>
         </div>
      </div>
   </nav>

   <div class="container mt-5" ng-app="shopApp" ng-controller="MainController">
      <h2 class="mb-4">Return a Product</h2>
   
      <div id="searchDropdownContainer" class="position-relative mb-4">
         <input type="text" id="searchInput" class="form-control" placeholder="Search product..." autocomplete="off">
         <div id="resultsList" class="list-group position-absolute w-100 shadow" style="display:none; z-index:1000;">
         </div>
      </div>
   
      <div id="productDisplay" class="card p-3 mb-4 bg-light" style="display:none;">
         <h5 id="selectedProductName" class="mb-0"></h5>
         <p id="selectedProductPrice" class="text-muted mb-0"></p>
      </div>
   
      <form ng-submit="submitReturn()" class="card p-4">
         <label>Reason</label>
         <select ng-model="returnDetails.reason" class="form-control mb-3" required>
               <option value="" disabled>Select Reason</option>
               <option>Damaged</option>
               <option>Wrong Item</option>
               <option>Not Satisfied</option>
           </select>
   
         <label>Condition</label>
         <select ng-model="returnDetails.condition" class="form-control mb-4" required>
               <option value="" disabled>Select Condition</option>
               <option>New</option>
               <option>Used</option>
               <option>Damaged</option>
           </select>
   
         <button type="submit" class="btn btn-danger w-100">Submit Return</button>
      </form>
   </div>

   <script src="billing-returns.js"></script>
</body>

</html>
